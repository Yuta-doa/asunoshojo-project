<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>昨日を失くした明日の少女 | 公式サイト</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: sans-serif;
            margin: 0;
            scroll-behavior: smooth; /* スムーズにスクロールさせる */
        }

        :root {
            --accent-color: #00ffff; 
        }

        /* 右上のナビゲーション */
        nav {
            position: fixed;
            top: 0;
            right: 0;
            padding: 20px 40px;
            z-index: 100;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            width: 100%;
            display: flex;
            justify-content: flex-end;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            margin-left: 30px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: color 0.3s;
        }

        nav a:hover {
            color: var(--accent-color);
            text-shadow: 0 0 10px var(--accent-color);
        }

        /* メインビジュアル（1920x1080サイズを使用） */
        .hero {
            width: 100%;
            height: 100vh;
            background: url('1.jpg') no-repeat center center;
            background-size: cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 100px 20px;
            text-align: center;
        }

        section {
            margin-bottom: 100px;
        }

        h2 {
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 10px;
            margin-bottom: 40px;
            letter-spacing: 3px;
        }

        /* ON AIR情報のスタイル */
        .onair-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            text-align: left;
            background: rgba(0, 255, 255, 0.05);
            padding: 30px;
            border: 1px solid rgba(0, 255, 255, 0.2);
        }
    </style>
</head>
<body>

    <nav>
        <a href="#story">STORY</a>
        <a href="#onair">ON AIR</a>
        <a href="#special">SPECIAL</a>
    </nav>

    <section class="/image/1.png">
        <div class="catchphrase">信じるのは未来か それとも過去の自分か</div>
        <p>2026年7月3日 放送開始予定！</p>
    </section>

    <div class="container">
        <section id="pv">
            <h2>SPECIAL MOVIE</h2>
            <div class="video-container">
                <iframe width="1396" height="785" src="https://www.youtube.com/embed/XBkEoj6xHFE" title="Coming Soon..." frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
            </div>
        </section>

        <section id="story">
            <h2>STORY</h2>
            <div class="story-text">
                <p>2045年。舞台は日本、いや荒廃し枯れ果てた日本だ。</p>
                <p>日本なのに荒廃し枯れ果てている、一体なぜなのか。</p>
                <p>そして、この世界は本当に日本なのか、はたまたまず、2045年なのだろうか。</p>
                <p>もしかしたら、この世界は仮想空間なのかもしれない。</p>
            </div>
        </section>
    </div>

</body>
</html>
