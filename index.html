<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>昨日を失くした明日の少女 | 公式サイト</title>
     <link rel="shortcut　icon" href="./image/favicon.ico">
    <style>
        /* 基本設定 */
        body {
            background-color: #000;
            color: #fff;
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* アクセントカラー（ロゴのシアンブルー） */
        :root {
            --accent-color: #00ffff; 
        }

        /* 右上ナビゲーション */
        nav {
            position: fixed;
            top: 0;
            right: 0;
            padding: 25px 50px;
            z-index: 100;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            width: 100%;
            display: flex;
            justify-content: flex-end;
            box-sizing: border-box;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            margin-left: 30px;
            font-weight: bold;
            font-size: 1.1rem;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        nav a:hover {
            color: var(--accent-color);
            text-shadow: 0 0 10px var(--accent-color);
        }

        /* メインビジュアルの修正：backgroundプロパティで画像を指定します */
        .hero {
            width: 100%;
            height: 100vh;
            /* 画像のパスをここに記述 */
            background: url('/image/P1 2026-03-05 23-36-32.png') no-repeat center center;
            background-size: cover;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding-bottom: 80px;
            box-sizing: border-box;
        }

        .catchphrase {
            font-size: 1.8rem;
            text-shadow: 2px 2px 10px rgba(0,0,0,1);
            margin-bottom: 10px;
            animation: fadeIn 3s ease-in-out;
            text-align: center;
        }

        /* コンテンツエリア */
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 100px 20px;
            text-align: center;
        }

        section {
            margin-bottom: 150px;
        }

        h2 {
            font-size: 2rem;
            border-bottom: 2px solid var(--accent-color);
            display: inline-block;
            padding-bottom: 10px;
            margin-bottom: 50px;
            letter-spacing: 4px;
        }

        /* あらすじテキスト */
        .story-box {
            line-height: 2;
            text-align: left;
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-left: 4px solid var(--accent-color);
            font-size: 1.1rem;
        }

        /* 動画の大きさを調整する枠 */
        .video-wrapper {
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* 16:9比率 */
            height: 0;
            overflow: hidden;
            background: #111;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* アニメーション */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* レスポンシブ対応 */
        @media (max-width: 600px) {
            nav { padding: 15px; justify-content: center; }
            nav a { margin: 0 10px; font-size: 0.9rem; }
            .catchphrase { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="#story">STORY</a>
        <a href="/onair" style="color: var(--accent-color);">ON AIR</a>
        <a href="#special">SPECIAL</a>
    </nav>

    <section class="hero">
        <div class="catchphrase">信じるのは未来か それとも過去の自分か</div>
        <p style="font-size: 1.2rem; text-shadow: 2px 2px 5px #000;">2026年7月3日 24:00 放送開始予定</p>
    </section>

    <div class="container">
        <section id="story">
            <h2>STORY</h2>
            <div class="story-box">
                <p>2045年。世界は終わった……はずだった。</p>
                <p>日本なのに荒廃し枯れ果てている、一体なぜなのか。</p>
                <p>もしかしたら、この世界は仮想空間なのかもしれない。</p>
                <p>信じるのは未来か、それとも過去の自分か。</p>
            </div>
        </section>

        <section id="special">
            <h2>SPECIAL MOVIE</h2>
            <p>15s CM 公開中</p>
            <div class="video-wrapper">
                <div class="video-container">
                    <iframe src="https://www.youtube.com/embed/XBkEoj6xHFE" title="Coming Soon..." frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
                </div>
            </div>
        </section>
    </div>

    <footer style="padding: 50px; text-align: center; font-size: 0.8rem; color: #555;">
        &copy; 明日の少女製作委員会
    </footer>

</body>
</html>
