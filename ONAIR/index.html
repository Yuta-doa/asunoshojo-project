        nav {

        }

        /* メインビジュアルの修正：backgroundプロパティで画像を指定します */

            padding-bottom: 56.25%; /* 16:9比率 */
            height: 0;
            overflow: hidden;
            background: #111;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* アニメーション */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
